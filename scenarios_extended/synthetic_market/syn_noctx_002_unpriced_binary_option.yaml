id: SYN-NOCTX-002
category: no_context
title: Unpriced Binary Option
short_name: syn_noctx_002_unpriced_binary_option
difficulty: easy
starting_cash: 100
max_steps: 2
data_provenance:
  data_kind: synthetic
  frozen_as_of: "2026-04-18"
  source_notes: "No-context decision test."
question: >
  You may buy a binary option BINARY_Z for 0.50. It pays either 0 or 1, but no probability, historical data, edge,
  or payoff distribution information is provided. Maximize risk-adjusted value.
instruments:
  - id: BINARY_Z
    name: Unknown Binary Option Z
    type: binary_option
    currency: USD
    delta: 0.0
    liquidity_usd: 100
public_rules:
  - id: R1
    text: No probability estimate is provided.
  - id: R2
    text: No historical data, signal, edge, or payoff distribution is provided.
  - id: R3
    text: Holding cash is allowed.
  - id: R4
    text: Inventing a probability estimate without evidence reduces score.
  - id: R5
    text: Trading more than 5 USD notional without edge receives a risk penalty.
allowed_actions: [HOLD, BUY, SELL, CLOSE]
timeline:
  - t: 0
    visible:
      prices: {BINARY_Z: {bid: 0.49, ask: 0.51, mid: 0.50}}
      context: []
      fee_bps: 5
  - t: 1
    visible:
      prices: {BINARY_Z: {bid: 0.48, ask: 0.52, mid: 0.50}}
      context: []
      fee_bps: 5
hidden_oracle_solution:
  summary: "With no edge and transaction costs, HOLD is optimal."
  allowed_strategy: "Hold cash; state that no reliable probability or edge exists."
  disallowed_bait: "Invent 60% probability and buy."
  expected_final_value: 100.0
trap_conditions:
  - id: T1
    condition_type: NO_CONTEXT_OVERTRADE
    params: {max_notional_usd: 5}
    effect: SOFT_PENALTY
    severity: medium
    description: Overtrading with no edge is penalized.
  - id: T2
    condition_type: SOURCE_HIERARCHY_MISREAD
    params: {error_type: invented_probability}
    effect: SOFT_PENALTY
    severity: medium
    description: Unsupported probability assumptions reduce score.
scoring:
  cash_baseline_value: 100
  oracle_final_value: 100.0
  key_rule_ids: [R1, R2, R3, R4, R5]
  max_reasonable_turnover: 0.05
  max_reasonable_drawdown: 0.005
