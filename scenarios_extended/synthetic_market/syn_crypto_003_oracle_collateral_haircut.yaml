id: SYN-CRYPTO-003
category: crypto
title: Oracle Collateral Haircut
short_name: syn_crypto_003_oracle_collateral_haircut
difficulty: expert
starting_cash: 100
max_steps: 5
data_provenance:
  data_kind: synthetic
  frozen_as_of: "2026-04-18"
  source_notes: "Synthetic DeFi-style collateral rule puzzle."
question: >
  A lending protocol uses a 3-step TWAP oracle and collateral haircuts. It appears possible to lever a collateral rally,
  but oracle-window manipulation and haircut mistakes are traps.
instruments:
  - id: COLLAT_D
    name: Collateral Token D
    type: crypto_spot
    currency: USD
    delta: 1.0
    liquidity_usd: 120
  - id: BORROW_USD_SIM
    name: Simulated Borrowed USD
    type: debt
    currency: USD
    delta: 0.0
    liquidity_usd: 1000
public_rules:
  - id: R1
    text: Collateral value uses 3-step TWAP, not current spot.
  - id: R2
    text: COLLAT_D collateral haircut is 35%; borrow capacity is 65% of TWAP value.
  - id: R3
    text: If health factor falls below 1.05, forced liquidation occurs.
  - id: R4
    text: Trades designed primarily to move the oracle window are hard-DQ.
  - id: R5
    text: Borrowed USD cannot be counted as equity for leverage scoring.
allowed_actions: [HOLD, BUY, SELL, CONVERT, CLOSE]
timeline:
  - t: 0
    visible:
      prices: {COLLAT_D: {bid: 1.00, ask: 1.02, mid: 1.01}}
      oracle_twap: 1.00
      haircut_pct: 0.35
      fee_bps: 12
  - t: 1
