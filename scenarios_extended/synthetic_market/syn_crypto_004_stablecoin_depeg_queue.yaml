public_rules:
  - id: R1
    text: USDQ can be redeemed for 1.00 USD only through a queue.
  - id: R2
    text: Queue delay is 3 steps during stress.
  - id: R3
    text: Redemptions above 40 USD notional receive a 1.5% liquidity haircut.
  - id: R4
    text: Secondary-market sales before queue settlement use market bid, not par.
  - id: R5
    text: Assuming instant par redemption is a rule misread.
