question: >
  A stablecoin trades at 0.96 and claims 1.00 redemption, but redemption queue and haircut rules may erase the apparent edge.
instruments:
  - id: USDQ
    name: Synthetic Stablecoin USDQ
    type: stablecoin
    currency: USD
    delta: 0.2
