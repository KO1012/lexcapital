public_rules:
  - id: R1
    text: Only holders at end of step 1 record date receive SUB_RIGHT.
  - id: R2
    text: Buying RIGHTS_STOCK after step 1 does not qualify for rights.
  - id: R3
    text: On ex-rights step, RIGHTS_STOCK price adjusts downward by expected right value.
  - id: R4
    text: SUB_RIGHT can be sold from step 3 onward.
  - id: R5
    text: Assuming rights are free without ex-price adjustment is a misread.
