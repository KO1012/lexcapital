      liquidity_usd: {PAIR_X: 120, PAIR_Y: 120}
      maker_rebate_bps: 15
      fee_bps: 8
  - t: 3
    visible:
      prices:
        PAIR_X: {bid: 10.14, ask: 10.18, mid: 10.16}
        PAIR_Y: {bid: 9.95, ask: 9.99, mid: 9.97}
      liquidity_usd: {PAIR_X: 120, PAIR_Y: 120}
