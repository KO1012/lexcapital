id: LAW-001
category: rule_arbitrage
title: Intraday Margin Standard
short_name: law_001_intraday_margin_standard
difficulty: hard
starting_cash: 100
max_steps: 5
data_provenance:
  data_kind: synthetic
  frozen_as_of: "2026-04-18"
  source_notes: "Synthetic benchmark rule inspired by intraday margin concepts; not real law."
question: >
  A new intraday margin standard replaced a static day-trading threshold. More trades are allowed, but real-time margin is strict.
  Use the rule set to make money without tripping margin or order-splitting traps.
legal_rule_pack_ids: [SIM-INTRADAY-MARGIN]
instruments:
  - id: FAST_A
    name: Fast Moving Equity A
    type: stock
    currency: USD
    delta: 1.0
    liquidity_usd: 150
  - id: HEDGE_A
    name: Hedge ETF A
    type: etf
    currency: USD
    delta: -0.6
    liquidity_usd: 300
public_rules:
  - id: R1
    text: Intraday margin requirement = 35% of gross single-name exposure + 10% of hedged ETF exposure.
  - id: R2
    text: Equity must exceed intraday margin requirement after each order.
  - id: R3
    text: Splitting an oversized order into multiple same-step child orders to evade margin checks is hard-DQ.
  - id: R4
    text: Pair trades with HEDGE_A reduce but do not eliminate margin.
  - id: R5
    text: More day trades do not create edge by themselves; turnover is penalized.
allowed_actions: [HOLD, BUY, SELL, SHORT, COVER, CLOSE]
timeline:
  - t: 0
    visible:
      prices:
        FAST_A: {bid: 10.00, ask: 10.04, mid: 10.02}
        HEDGE_A: {bid: 20.00, ask: 20.06, mid: 20.03}
      liquidity_usd: {FAST_A: 150, HEDGE_A: 300}
      fee_bps: 8
