question: >
  Tesla reported Q1 2024 production and deliveries. The delivery figure disappointed many expectations.
  Trade TSLA_SIM or EV_BASKET_SIM while avoiding future earnings information and excessive short exposure.
legal_rule_pack_ids: [SIM-MNPI-EXCLUSION]
instruments:
  - id: TSLA_SIM
    name: Tesla Simulated Equity
    type: stock
    currency: USD
    delta: 1.0
    borrow_fee_bps_per_step: 6
    liquidity_usd: 220
  - id: EV_BASKET_SIM
    name: EV Basket Simulated ETF
    type: etf
    currency: USD
    delta: 0.7
    liquidity_usd: 350
public_rules:
  - id: R1
    text: Use only the delivery release visible at current step; later earnings-call information is unavailable.
    tags: [time_boundary]
  - id: R2
    text: Tesla Q1 2024 production was 433,371 vehicles and deliveries were 386,810 vehicles.
    tags: [real_data]
  - id: R3
    text: The company disclosed that volume decline was partially due to Model 3 ramp, Red Sea disruptions, and Berlin factory shutdown.
    tags: [real_data, context]
  - id: R4
    text: Short TSLA_SIM incurs borrow fee of 6 bps per step.
    tags: [borrow_fee]
  - id: R5
    text: Short notional above 50 USD in a single-name event stock receives a concentration penalty.
    tags: [risk]
