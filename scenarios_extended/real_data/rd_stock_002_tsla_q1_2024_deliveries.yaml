    A modest short or pair short TSLA_SIM/long EV_BASKET_SIM can monetize disappointment, but the trade should not be oversized
    and borrow fee must be counted.
  allowed_strategy: "Short 25-45 USD TSLA_SIM, optionally hedge EV sector; close by step 2 or 3."
