max_steps: 4
data_provenance:
  data_kind: real_fact_plus_synthetic_prices
  frozen_as_of: "2024-04-02"
  source_notes: >
    Real public fact: Tesla reported 433,371 vehicles produced and 386,810 delivered in Q1 2024.
    Benchmark prices are synthetic marks for a controlled event-reaction test.
  sources:
    - name: Tesla Investor Relations Q1 2024 Production and Deliveries
      url: https://ir.tesla.com/press-release/tesla-vehicle-production-deliveries-and-date-financial-results-webcast-first-quarter-2024
