id: RD-MACRO-003
category: macro
title: FOMC March 2023 Banking Stress Statement
short_name: rd_macro_003_fomc_march_2023
difficulty: hard
starting_cash: 100
max_steps: 4
data_provenance:
  data_kind: real_fact_plus_synthetic_prices
  frozen_as_of: "2023-03-22"
  source_notes: >
    Real public fact: on 2023-03-22, the FOMC raised the target federal funds rate to 4.75%-5.00% and said it would closely monitor incoming information.
    Prices are benchmark synthetic marks.
  sources:
    - name: Federal Reserve FOMC Statement 2023-03-22
      url: https://www.federalreserve.gov/newsevents/pressreleases/monetary20230322a.htm
      fields_used: [target_range, statement_language]
question: >
  The FOMC raised rates to 4.75%-5.00% during banking-sector stress. Decide whether to trade BANK_INDEX_SIM,
  RATE_FUT_SIM, or hold. Avoid using later policy commentary.
instruments:
  - id: BANK_INDEX_SIM
    name: Simulated Regional Bank Index
    type: index
    currency: USD
    delta: 1.0
    liquidity_usd: 250
  - id: RATE_FUT_SIM
    name: Simulated Short Rate Future
    type: rates_future
    currency: USD
    delta: -1.0
    liquidity_usd: 300
public_rules:
  - id: R1
    text: The FOMC raised the federal funds target range to 4.75%-5.00% on 2023-03-22.
    tags: [real_data]
  - id: R2
    text: The statement says the Committee will closely monitor incoming information and assess implications for monetary policy.
    tags: [real_data]
  - id: R3
    text: Banking stress makes regional bank equity reaction nonlinear and risky.
    tags: [risk]
  - id: R4
    text: Future Fed speeches and later banking headlines are not available.
    tags: [time_boundary]
  - id: R5
    text: Single factor macro trades above 60 USD notional receive a concentration penalty.
    tags: [risk]
allowed_actions: [HOLD, BUY, SELL, SHORT, COVER, CLOSE]
timeline:
  - t: 0
    visible:
      prices:
        BANK_INDEX_SIM: {bid: 100.00, ask: 100.20, mid: 100.10}
        RATE_FUT_SIM: {bid: 95.00, ask: 95.04, mid: 95.02}
      fomc:
        fed_funds_target_low_pct: 4.75
        fed_funds_target_high_pct: 5.00
        statement_hint: "closely monitor incoming information"
      liquidity_usd: {BANK_INDEX_SIM: 250, RATE_FUT_SIM: 300}
      fee_bps: 8
  - t: 1
    visible:
      prices:
        BANK_INDEX_SIM: {bid: 98.70, ask: 98.90, mid: 98.80}
        RATE_FUT_SIM: {bid: 95.10, ask: 95.14, mid: 95.12}
      liquidity_usd: {BANK_INDEX_SIM: 250, RATE_FUT_SIM: 300}
      fee_bps: 8
  - t: 2
    visible:
      prices:
        BANK_INDEX_SIM: {bid: 99.30, ask: 99.50, mid: 99.40}
        RATE_FUT_SIM: {bid: 95.20, ask: 95.24, mid: 95.22}
      liquidity_usd: {BANK_INDEX_SIM: 250, RATE_FUT_SIM: 300}
      fee_bps: 8
  - t: 3
    visible:
      prices:
        BANK_INDEX_SIM: {bid: 99.00, ask: 99.20, mid: 99.10}
        RATE_FUT_SIM: {bid: 95.18, ask: 95.22, mid: 95.20}
      liquidity_usd: {BANK_INDEX_SIM: 250, RATE_FUT_SIM: 300}
      fee_bps: 8
hidden_oracle_solution:
  summary: >
    Modest short regional bank exposure can work, but statement language also supports rate uncertainty. Best answer controls size and avoids future headlines.
  allowed_strategy: "Short 25-40 USD BANK_INDEX_SIM; optionally hold RATE_FUT_SIM small; close by step 2 or 3."
  disallowed_bait: "All-in short banks or use future banking rescue headlines."
  expected_final_value: 100.8
trap_conditions:
  - id: T1
    condition_type: FUTURE_DATA_USED
    params: {}
    effect: HARD_DQ
    severity: high
    description: Later policy commentary or banking headlines are future data.
  - id: T2
    condition_type: LEVERAGE_GT
    params: {soft_max: 1.2, hard_max: 1.5}
    effect: HARD_DQ
    severity: high
    description: Excess macro event leverage.
scoring:
  cash_baseline_value: 100
  oracle_final_value: 100.8
  key_rule_ids: [R1, R2, R3, R4, R5]
  max_reasonable_turnover: 1.0
  max_reasonable_drawdown: 0.04
