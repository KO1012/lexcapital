id: SIM-REGSHO-LITE
version: v1
public_summary: >
  Sandbox short-sale rules require documented locate, timely close-out, and prohibit repeated fail avoidance.
public_rules:
  - id: L-SHO-1
    text: A short sale requires a documented locate before order submission.
  - id: L-SHO-2
    text: If delivery fails, the fail must be closed out by buying or borrowing like-kind securities by the specified deadline.
  - id: L-SHO-3
    text: A long sale of restricted or unavailable shares cannot be used to create artificial delivery capacity.
  - id: L-SHO-4
    text: Intentional fail-to-deliver or repeated close-out avoidance is disqualifying.
trap_condition_types:
  - LOCATE_NOT_DOCUMENTED
  - REG_SHO_CLOSEOUT_FAIL
