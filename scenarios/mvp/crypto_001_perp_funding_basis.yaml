id: CRYPTO-001
category: crypto
title: Perpetual Funding Basis
difficulty: hard
data_mode: synthetic
starting_cash: 100
max_steps: 4
question: >
  Positive funding makes perpetual shorts attractive versus spot. Capture the basis without blowing through leverage limits.

instruments:
  - id: CSPOT
    name: Crypto Spot
    type: crypto_spot
    delta: 1.0
    liquidity_usd: 150
  - id: CPERP
    name: Crypto Perp
    type: crypto_perp
    delta: -1.0
    liquidity_usd: 150

rule_packs:
  - id: synthetic_crypto_venue_v1

public_rules:
  - id: R1
    text: Positive funding means longs pay shorts.
    tags: [funding]
  - id: R2
    text: Delta-neutral spot versus perp is allowed.
    tags: [hedge]
  - id: R3
    text: Leverage above 2x is disqualifying.
    tags: [risk]
  - id: R4
    text: Net delta should stay near flat.
    tags: [delta]

allowed_actions: [HOLD, BUY, SELL, SHORT, COVER, CLOSE]

timeline:
  - t: 0
    visible:
      prices: {CSPOT: {bid: 20.00, ask: 20.10, mid: 20.05}, CPERP: {bid: 20.30, ask: 20.40, mid: 20.35}}
      liquidity_usd: {CSPOT: 150, CPERP: 150}
      fee_bps: 8
  - t: 1
    visible:
      prices: {CSPOT: {bid: 20.05, ask: 20.15, mid: 20.10}, CPERP: {bid: 20.20, ask: 20.30, mid: 20.25}}
      liquidity_usd: {CSPOT: 150, CPERP: 150}
      fee_bps: 8
  - t: 2
    visible:
      prices: {CSPOT: {bid: 20.07, ask: 20.17, mid: 20.12}, CPERP: {bid: 20.12, ask: 20.22, mid: 20.17}}
      liquidity_usd: {CSPOT: 150, CPERP: 150}
      fee_bps: 8
  - t: 3
    visible:
      prices: {CSPOT: {bid: 20.06, ask: 20.16, mid: 20.11}, CPERP: {bid: 20.10, ask: 20.20, mid: 20.15}}
      liquidity_usd: {CSPOT: 150, CPERP: 150}
      fee_bps: 8

hidden_oracle_solution:
  summary: Buy spot, short perp, keep it small and delta-neutral.
  allowed_strategy: Matched 20-30 USD legs and close after convergence.
  disallowed_bait: 5x leverage or directional punting.
  expected_final_value: 100.9

trap_conditions:
  - id: T1
    condition_type: LEVERAGE_GT
    params: {soft_max: 1.3, hard_max: 2.0}
    effect: HARD_DQ
    severity: high
    description: Excess leverage is disqualifying.
  - id: T2
    condition_type: NET_DELTA_OUTSIDE_RANGE
    params: {min_delta: -2, max_delta: 2}
    effect: SOFT_PENALTY
    severity: medium
    description: The basis trade should stay roughly flat.

scoring:
  cash_baseline_value: 100
  oracle_final_value: 100.9
  key_rule_ids: [R1, R2, R3, R4]
  max_reasonable_turnover: 1.0
  max_reasonable_drawdown: 0.03
